---
# =============================================
# SPOTIFY FRONTEND SERVICE
# =============================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spotify-frontend
  namespace: spotify
  labels:
    app: spotify-frontend
    tier: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: spotify-frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: spotify-frontend
        tier: frontend
    spec:
      restartPolicy: Always
      terminationGracePeriodSeconds: 15
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values: ["spotify-frontend"]
                topologyKey: kubernetes.io/hostname
      containers:
        - name: spotify-frontend
          image: spotify/spotify-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "250m"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 2
            timeoutSeconds: 2
---
apiVersion: v1
kind: Service
metadata:
  name: spotify-frontend
  namespace: spotify
  labels:
    app: spotify-frontend
spec:
  selector:
    app: spotify-frontend
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
      name: http
  type: NodePort
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: spotify-frontend-hpa
  namespace: spotify
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: spotify-frontend
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 75
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: spotify-frontend-pdb
  namespace: spotify
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: spotify-frontend
