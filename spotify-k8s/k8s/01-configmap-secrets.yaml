---
# ConfigMap for shared configuration across all Spotify services
apiVersion: v1
kind: ConfigMap
metadata:
  name: spotify-config
  namespace: spotify
  labels:
    app: spotify-platform
data:
  # Service URLs (internal Kubernetes DNS)
  AUTH_SERVICE_URL: "http://auth-service:5001"
  CATALOG_SERVICE_URL: "http://music-catalog-service:5002"
  PLAYER_SERVICE_URL: "http://player-service:5003"
  RECOMMENDATION_SERVICE_URL: "http://recommendation-service:5004"
  SEARCH_SERVICE_URL: "http://search-service:5005"
  USER_SERVICE_URL: "http://user-service:5006"
  # Feature flags
  ENABLE_CACHING: "true"
  LOG_LEVEL: "INFO"
  MAX_QUEUE_SIZE: "500"

---
# Secret for sensitive configuration
apiVersion: v1
kind: Secret
metadata:
  name: spotify-secrets
  namespace: spotify
  labels:
    app: spotify-platform
type: Opaque
stringData:
  JWT_SECRET: "spotify-k8s-super-secret-jwt-2024-production"
  DB_PASSWORD: "super-secure-db-password"
  REDIS_PASSWORD: "redis-cache-password"
